name: 🚀 CI/CD — Build & Deploy (Zero Downtime)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: 🔍 Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🟢 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install frontend deps
        run: npm ci

      - name: 📦 Install backend deps
        run: npm --prefix server ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build frontend
        run: npm run build

      - name: 🏗️ Build backend
        run: npm run build:api

  deploy:
    name: 🚀 Deploy to HPE Server (Zero Downtime)
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    timeout-minutes: 15

    env:
      DOCKER_API_VERSION: "1.42"

    steps:
      # 🔍 Debug SSH (keep for safety)
      - name: 🔍 Debug SSH
        run: |
          whoami
          ssh -T git@github.com || true

      # 📦 Pull latest code
      - name: 📦 Pull latest code
        run: |
          cd /home/ethan/brikien
          GIT_SSH_COMMAND="ssh -i /home/ethan/.ssh/id_ed25519 -o IdentitiesOnly=yes" git fetch origin main
          git reset --hard origin/main

      # 🔨 Zero downtime deploy (KEY CHANGE)
      - name: 🔨 Zero Downtime Deploy
        run: |
          cd /home/ethan/brikien

          echo "🚀 Building new containers..."
          docker-compose build

          echo "🚀 Starting new containers (no downtime)..."
          docker-compose up -d --remove-orphans

          echo "🧹 Cleaning unused images..."
          docker image prune -f

      # ⏳ Wait for services
      - name: ⏳ Wait for services to stabilize
        run: sleep 10

      # ✅ Health check
      - name: ✅ Health check
        run: |
          docker ps --format "table {{.Names}}\t{{.Status}}"
          echo "🌐 App should be live"
          echo "✅ Deployed at $(date)"