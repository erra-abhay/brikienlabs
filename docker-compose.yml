services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brikien-app
    ports:
      - "127.0.0.1:55525:8787"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-https://brikienlabs.tech}
      - REQUIRE_HUMAN_CHECK=${REQUIRE_HUMAN_CHECK:-true}
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8787/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
