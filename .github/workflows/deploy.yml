name: 🚀 CI/CD — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: 🔍 Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: npm --prefix server ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Build backend
        run: npm run build:api

  deploy:
    name: 🚀 Deploy to HPE Server
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: 📦 Pull latest code
        run: |
          cd ~/brikien
          git fetch origin main
          git reset --hard origin/main

      - name: 🔨 Rebuild & deploy
        run: |
          cd ~/brikien
          docker-compose down
          docker-compose up --build -d
          docker image prune -f

      - name: ✅ Health check
        run: |
          sleep 5
          docker ps --format "table {{.Names}}\t{{.Status}}" | grep brikien
          echo "✅ Deployed at $(date)"
