# Brikien Labs — brikienlabs.tech
# Add this to your server's Nginx sites config
# e.g. /etc/nginx/sites-available/brikienlabs.tech

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name brikienlabs.tech www.brikienlabs.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name brikienlabs.tech www.brikienlabs.tech;

    # SSL (update paths to match your certs)
    ssl_certificate     /etc/letsencrypt/live/brikienlabs.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brikienlabs.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Vite hashed assets — long cache
    location /assets/ {
        proxy_pass http://127.0.0.1:55528;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # API rate limiting
    location /api/ {
        proxy_pass http://127.0.0.1:55528;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Everything else → app
    location / {
        proxy_pass http://127.0.0.1:55528;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
